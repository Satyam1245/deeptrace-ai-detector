<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepTrace AI Detector</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-shield-halved"></i>
                <span>DeepTrace AI <strong>Detector</strong></span>
            </div>
            <div class="header-controls">
                <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
                    <i class="fas fa-sun"></i>
                </button>
                <div class="status-pill online">
                    <span class="dot"></span> System Active
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Upload Section -->
            <section class="upload-section">
                <div class="upload-box" id="drop-zone">
                    <div class="upload-icon">
                        <i class="fas fa-cloud-arrow-up"></i>
                    </div>
                    <div>
                        <h2>Upload File (Image / Video / Audio)</h2>
                        <p>Drag & drop or <span class="browse-link">browse</span></p>
                    </div>
                    <input type="file" id="file-input" accept="image/*,video/*,audio/*,.mkv,.webm,.flac,.m4a" hidden>
                </div>

                <button class="analyze-btn" id="analyze-btn" disabled>
                    <i class="fas fa-magnifying-glass-chart"></i>
                    <span>Analyze File</span>
                </button>
            </section>

            <!-- Quick Demo Section -->
            <section class="quick-demo">
                <div class="demo-label">
                    <i class="fas fa-bolt"></i> Quick Demo
                </div>
                <div class="demo-buttons">
                    <button class="demo-btn" data-sample="real">
                        <i class="fas fa-user-check"></i> Real Photo
                    </button>
                    <button class="demo-btn" data-sample="deepfake">
                        <i class="fas fa-user-xmark"></i> Deepfake
                    </button>
                </div>
            </section>

            <!-- Preview Section -->
            <section class="preview-section">
                <div class="preview-header">
                    <h3 id="preview-title">Media Analysis</h3>
                    <div class="view-tabs" id="view-tabs">
                        <button class="tab active" data-view="original"
                            data-tooltip="Original uploaded image">Original</button>
                        <button class="tab" data-view="neural"
                            data-tooltip="Grad-CAM heatmap showing AI attention areas">X-Ray</button>
                        <button class="tab" data-view="fft"
                            data-tooltip="Frequency spectrum analysis for texture anomalies">Spectrum</button>
                        <button class="tab" data-view="ela"
                            data-tooltip="Error Level Analysis detecting compression artifacts">Artifacts</button>
                    </div>
                </div>
                <div class="preview-container" id="preview-container">
                    <div class="placeholder">
                        <i class="fas fa-image"></i>
                        <p>No image uploaded</p>
                    </div>
                    <img id="preview-image" src="" alt="Preview" class="hidden">
                    <div class="scan-overlay hidden" id="scan-overlay"></div>
                </div>
            </section>

            <!-- Results Section -->
            <section class="results-section hidden" id="results-section">
                <div class="result-card verdict-card" id="verdict-card">
                    <div class="card-label">
                        Verdict
                        <i class="fas fa-info-circle tooltip-icon"
                            data-tooltip="Final classification based on AI analysis"></i>
                    </div>
                    <div class="verdict" id="verdict">--</div>
                    <div class="face-indicator" id="face-indicator"></div>
                </div>

                <div class="result-card">
                    <div class="card-label">
                        Threat Level
                        <i class="fas fa-info-circle tooltip-icon"
                            data-tooltip="Combined score from Neural (60%), ELA (25%), and FFT (15%) analysis"></i>
                    </div>
                    <div class="threat-meter">
                        <div class="threat-fill" id="threat-fill"></div>
                    </div>
                    <div class="threat-value" id="threat-value">0%</div>
                </div>

                <div class="result-card stats-card">
                    <div class="stat">
                        <span class="stat-label">Confidence</span>
                        <span class="stat-value" id="confidence">0%</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Real Probability</span>
                        <span class="stat-value green" id="real-prob">0%</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Fake Probability</span>
                        <span class="stat-value red" id="fake-prob">0%</span>
                    </div>
                    <button class="export-btn" id="export-btn">
                        <i class="fas fa-download"></i> Export Report
                    </button>
                </div>
            </section>
        </main>

        <!-- Console -->
        <aside class="console">
            <div class="console-header">
                <i class="fas fa-terminal"></i> System Log
            </div>
            <div class="console-content" id="console">
                <div class="log">System initialized</div>
                <div class="log">Ready for analysis</div>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>

</html>
